<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume -> Job Fit Score</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="./auth.html">Login/Register</a>
        <a href="./pricing.html">Pricing</a>
        <a href="./dashboard.html">Dashboard</a>
    </div>
    <div class="card">
        <h1>Resume -> Job Fit Score</h1>
        <p class="muted">Upload your resume, paste a job description, and get an AI-based fit score.</p>

        <label for="resume">Step 1: Upload Resume (PDF/DOCX)</label>
        <input id="resume" type="file" accept=".pdf,.docx">

        <label for="jobDescription">Step 2: Paste Job Description</label>
        <textarea id="jobDescription" placeholder="Paste job description here..."></textarea>

        <button id="checkFitBtn">Step 3: Check Fit Score</button>
        <p id="message"></p>
    </div>
</div>
<script src="./js/upload.js"></script>
</body>
</html>
