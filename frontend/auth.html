<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeFit | Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./components.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="navbarMount"></div>
<main class="page">
    <div class="container">
        <div class="grid">
            <div class="card">
                <h2 class="section-title">Create Account</h2>
                <p class="section-subtitle">Keep your scans synced across sessions.</p>
                <input class="input" id="regEmail" type="email" placeholder="Email">
                <input class="input" id="regPassword" type="password" placeholder="Password" style="margin-top:10px;">
                <button class="button button-primary button-block" id="registerBtn" style="margin-top:14px;">Create Account</button>
            </div>
            <div class="card">
                <h2 class="section-title">Login</h2>
                <p class="section-subtitle">Continue where you left off.</p>
                <input class="input" id="loginEmail" type="email" placeholder="Email">
                <input class="input" id="loginPassword" type="password" placeholder="Password" style="margin-top:10px;">
                <button class="button button-secondary button-block" id="loginBtn" style="margin-top:14px;">Login</button>
            </div>
        </div>
        <p id="authMessage" class="muted" style="margin-top:14px;"></p>
    </div>
</main>
<div id="footerMount"></div>
<script src="./js/components.js"></script>
<script src="./env.js"></script>
<script src="./js/auth.js"></script>
</body>
</html>
