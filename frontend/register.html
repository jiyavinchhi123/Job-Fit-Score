<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeFit | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./components.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./auth.css">
</head>
<body>
<div id="navbarMount"></div>
<main class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">Resume<span>Fit</span></div>
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Start analyzing resumes and job descriptions instantly.</p>

        <form id="registerForm" novalidate>
            <label class="auth-label" for="registerName">Full Name</label>
            <div class="input-wrap">
                <span class="input-icon">&#128100;</span>
                <input class="input auth-input" id="registerName" type="text" placeholder="Your full name" autocomplete="name">
            </div>
            <p class="field-error" id="registerNameError"></p>

            <label class="auth-label" for="registerEmail">Email</label>
            <div class="input-wrap">
                <span class="input-icon">&#9993;</span>
                <input class="input auth-input" id="registerEmail" type="email" placeholder="you@example.com" autocomplete="email">
            </div>
            <p class="field-error" id="registerEmailError"></p>

            <label class="auth-label" for="registerPassword">Password</label>
            <div class="input-wrap">
                <span class="input-icon">&#128274;</span>
                <input class="input auth-input" id="registerPassword" type="password" placeholder="Minimum 6 characters" autocomplete="new-password">
            </div>
            <p class="field-error" id="registerPasswordError"></p>

            <label class="auth-label" for="registerConfirmPassword">Confirm Password</label>
            <div class="input-wrap">
                <span class="input-icon">&#128274;</span>
                <input class="input auth-input" id="registerConfirmPassword" type="password" placeholder="Re-enter password" autocomplete="new-password">
            </div>
            <p class="field-error" id="registerConfirmPasswordError"></p>

            <button class="button button-primary button-block auth-submit" id="registerBtn" type="submit">Create Account</button>
            <p class="field-error" id="registerFormError"></p>
        </form>

        <p class="auth-switch">Already have an account? <a href="./login.html">Login</a></p>
    </div>
</main>
<div id="footerMount"></div>
<script src="./js/components.js"></script>
<script src="./auth.js"></script>
</body>
</html>
