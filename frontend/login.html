<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeFit | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./components.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./auth.css">
</head>
<body>
<div id="navbarMount"></div>
<main class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">Resume<span>Fit</span></div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Login to continue analyzing your resume.</p>

        <form id="loginForm" novalidate>
            <label class="auth-label" for="loginEmail">Email</label>
            <div class="input-wrap">
                <span class="input-icon">&#9993;</span>
                <input class="input auth-input" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email">
            </div>
            <p class="field-error" id="loginEmailError"></p>

            <label class="auth-label" for="loginPassword">Password</label>
            <div class="input-wrap">
                <span class="input-icon">&#128274;</span>
                <input class="input auth-input" id="loginPassword" type="password" placeholder="Enter your password" autocomplete="current-password">
            </div>
            <p class="field-error" id="loginPasswordError"></p>

            <button class="button button-primary button-block auth-submit" id="loginBtn" type="submit">Login</button>
            <p class="field-error" id="loginFormError"></p>
        </form>

        <p class="auth-switch">Don't have an account? <a href="./register.html">Register</a></p>
    </div>
</main>
<div id="footerMount"></div>
<script src="./js/components.js"></script>
<script src="./env.js"></script>
<script src="./auth.js"></script>
</body>
</html>
